<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutonoMe - Gestión Local</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        nav { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <nav class="container">
        <ul><li><strong>🚀 AutonoMe</strong></li></ul>
        <ul>
            <li><a href="#" onclick="showTab('facturas')">Facturas</a></li>
            <li><a href="#" onclick="showTab('clientes')">Clientes</a></li>
            <li><a href="#" onclick="showTab('gastos')">Gastos</a></li>
            <li><a href="#" onclick="showTab('config')">⚙️</a></li>
        </ul>
    </nav>

    <main class="container">
        <!-- PESTAÑA: FACTURAS -->
        <section id="tab-facturas" class="tab-content active">
            <h2>Facturas</h2>
            <button class="contrast"> + Nueva Factura</button>
            <table>
                <thead>
                    <tr><th>Nº</th><th>Cliente</th><th>Total</th><th>Acciones</th></tr>
                </thead>
                <tbody id="lista-facturas"></tbody>
            </table>
        </section>

        <!-- PESTAÑA: CLIENTES -->
        <section id="tab-clientes" class="tab-content">
            <h2>Gestión de Clientes</h2>
            <button onclick="prepararNuevoCliente()"> + Añadir Cliente</button>
            <table role="grid">
                <thead>
                    <tr><th>Nombre</th><th>NIF</th><th>Acciones</th></tr>
                </thead>
                <tbody id="lista-clientes"></tbody>
            </table>
        </section>

        <!-- PESTAÑA: GASTOS -->
        <section id="tab-gastos" class="tab-content">
            <header class="grid">
                <h2>Control de Gastos</h2>
                <button onclick="prepararNuevoGasto()"> + Registrar Gasto</button>
            </header>
            <table role="grid">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Concepto</th>
                        <th>Categoría</th>
                        <th>Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-gastos"></tbody>
            </table>
        </section>

        <!-- PESTAÑA: FORMULARIO GASTO -->
        <section id="tab-form-gasto" class="tab-content">
            <h2>Nuevo Gasto / Compra</h2>
            <form id="form-gasto">
                <input type="hidden" id="g-id-edit">
                <div class="grid">
                    <label>Fecha <input type="date" id="g-fecha" required></label>
                    <label>Categoría
                        <select id="g-categoria">
                            <option value="Suministros">Suministros (Luz, Internet...)</option>
                            <option value="Software">Software/Suscripciones</option>
                            <option value="Material">Material de oficina</option>
                            <option value="Alquiler">Alquiler / Coworking</option>
                            <option value="Otros">Otros</option>
                        </select>
                    </label>
                </div>
                <label>Concepto <input type="text" id="g-concepto" placeholder="Ej: Factura Movistar" required></label>
                <div class="grid">
                    <label>Base Imponible (€) <input type="number" id="g-base" step="0.01" required></label>
                    <label>IVA (%) <input type="number" id="g-iva" value="21" step="1"></label>
                </div>
                <div class="grid">
                    <button type="submit">Guardar Gasto</button>
                    <button type="button" class="secondary" onclick="showTab('gastos')">Cancelar</button>
                </div>
            </form>
        </section>

        <!-- PESTAÑA: FORMULARIO CLIENTE (Separado) -->
        <section id="tab-form-cliente" class="tab-content">
            <h2>Nuevo Cliente</h2>
            <form id="form-cliente">
                <input type="text" id="c-nombre" placeholder="Nombre Comercial" required>
                <input type="text" id="c-nif" placeholder="NIF/CIF" required>
                <input type="email" id="c-email" placeholder="Email de contacto">
                <div class="grid">
                    <label>Calle y Número <input type="text" id="c-calle" placeholder="Ej: Calle Mayor 1, 2B"></label>
                    <label>Código Postal <input type="text" id="c-cp" placeholder="28001"></label>
                </div>
                <div class="grid">
                    <label>Ciudad <input type="text" id="c-ciudad" placeholder="Madrid"></label>
                    <label>Provincia <input type="text" id="c-provincia" placeholder="Madrid"></label>
                </div>
                <!-- Campo oculto para saber si estamos editando o creando -->
                <input type="hidden" id="c-id-edit">
                <div class="grid">
                    <button type="submit">Guardar Cliente</button>
                    <button type="button" class="secondary" onclick="showTab('clientes')">Cancelar</button>
                </div>
            </form>
        </section>

        <!-- PESTAÑA: CONFIGURACIÓN -->
        <section id="tab-config" class="tab-content">
            <h2>Configuración</h2>
            <article>
                <label for="theme-switch">
                    <input type="checkbox" id="theme-switch" role="switch" onclick="toggleTheme()">
                    Modo Oscuro
                </label>
            </article>
            <hr>
            <div class="grid">
                <button class="secondary" onclick="exportarTodo()">📤 Exportar Todo</button>

                <!-- Input oculto para seleccionar el archivo -->
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importarTodo(this)">
                <button class="secondary" onclick="document.getElementById('import-file').click()">📥 Importar Todo</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
